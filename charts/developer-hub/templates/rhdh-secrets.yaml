kind: Secret
apiVersion: v1
metadata:
  name: rhdh-secrets
stringData:
  BACKEND_SECRET: replaceme
  KEYCLOAK_BASE_URL: "{{ .Values.auth.keycloakUrl }}"
  KEYCLOAK_REALM: "{{ .Values.auth.keycloakRealm }}"
  KEYCLOAK_CLIENT_ID: "{{ .Values.auth.clientId }}"
  KEYCLOAK_CLIENT_SECRET: "{{ .Values.auth.clientSecret }}"
  GIT_TOKEN: "{{ .Values.git.token }}"
  GITLAB_TOKEN: "{{ .Values.gitlab.token }}"
  GITHUB_CLIENT_ID: "{{ .Values.git.clientId }}"
  GITHUB_SECRET: "{{ .Values.git.secret }}"
  GITLAB_CLIENT_ID: "{{ .Values.gitlab.clientId }}"
  GITLAB_SECRET: "{{ .Values.gitlab.secret }}"
type: Opaque