apiVersion: rhdh.redhat.com/v1alpha1
kind: Backstage
metadata:
  name: backstage
spec:
  application:
    dynamicPluginsConfigMapName: dynamic-plugins-rhdh
    appConfig:
      mountPath: /opt/app-root/src
      configMaps:
      - name: app-config-rhdh
    extraEnvs:
      secrets:
        - name: rhdh-secrets
      envs:
        - name: NODE_TLS_REJECT_UNAUTHORIZED
          value: '0'
    replicas: 1
    route:
      enabled: true
  database:
    enableLocalDb: true